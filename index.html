<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心情气象站 - 记录你的情绪天气</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="app-container">
        <div id="atmosphere-bg" class="atmosphere-bg"></div>
        <div id="rain-container" class="rain-container"></div>
        <div id="lightning-overlay" class="lightning-overlay"></div>
        <div id="particles" class="particles"></div>

        <header class="app-header">
            <div class="header-content">
                <div class="logo-area">
                    <svg class="logo-icon" viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2"/>
                        <circle cx="24" cy="24" r="10" fill="currentColor" opacity="0.3"/>
                        <circle cx="24" cy="24" r="4" fill="currentColor"/>
                        <line x1="24" y1="4" x2="24" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="24" y1="38" x2="24" y2="44" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="4" y1="24" x2="10" y2="24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="38" y1="24" x2="44" y2="24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <div class="logo-text">
                        <h1 class="app-title">心情气象站</h1>
                        <p class="app-subtitle">Mood Weather Station</p>
                    </div>
                </div>
                <div id="current-time" class="current-time"></div>
            </div>
        </header>

        <main class="main-content">
            <section id="greeting-section" class="greeting-section">
                <h2 id="greeting-text" class="greeting-text"></h2>
                <p class="greeting-hint">选择今天的天气，记录你的心情</p>
            </section>

            <section id="mood-selector" class="mood-selector">
                <div class="mood-header">
                    <span class="mood-header-line"></span>
                    <span class="mood-header-title">今日心情</span>
                    <span class="mood-header-line"></span>
                </div>
                <div class="mood-icons">
                    <button class="mood-btn" data-mood="sunny" data-label="愉悦">
                        <div class="mood-icon-wrapper">
                            <svg class="mood-icon" viewBox="0 0 80 80">
                                <defs>
                                    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
                                        <stop offset="0%" stop-color="#FFD93D" stop-opacity="0.8"/>
                                        <stop offset="100%" stop-color="#FFD93D" stop-opacity="0"/>
                                    </radialGradient>
                                </defs>
                                <circle cx="40" cy="40" r="25" fill="url(#sunGlow)"/>
                                <circle cx="40" cy="40" r="16" fill="none" stroke="#FFD93D" stroke-width="3"/>
                                <g stroke="#FFD93D" stroke-width="2.5" stroke-linecap="round">
                                    <line x1="40" y1="8" x2="40" y2="18"/>
                                    <line x1="40" y1="62" x2="40" y2="72"/>
                                    <line x1="8" y1="40" x2="18" y2="40"/>
                                    <line x1="62" y1="40" x2="72" y2="40"/>
                                    <line x1="17" y1="17" x2="24" y2="24"/>
                                    <line x1="56" y1="56" x2="63" y2="63"/>
                                    <line x1="17" y1="63" x2="24" y2="56"/>
                                    <line x1="56" y1="24" x2="63" y2="17"/>
                                </g>
                            </svg>
                            <div class="mood-icon-shine"></div>
                        </div>
                        <div class="mood-info">
                            <span class="mood-emoji">☀️</span>
                            <span class="mood-label">晴</span>
                            <span class="mood-emotion">愉悦</span>
                        </div>
                    </button>

                    <button class="mood-btn" data-mood="cloudy" data-label="平静">
                        <div class="mood-icon-wrapper">
                            <svg class="mood-icon" viewBox="0 0 80 80">
                                <defs>
                                    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                        <stop offset="0%" stop-color="#E8ECF0"/>
                                        <stop offset="100%" stop-color="#C4CDD6"/>
                                    </linearGradient>
                                </defs>
                                <ellipse cx="30" cy="45" rx="18" ry="12" fill="url(#cloudGrad)"/>
                                <ellipse cx="50" cy="42" rx="20" ry="14" fill="url(#cloudGrad)"/>
                                <ellipse cx="40" cy="38" rx="16" ry="12" fill="url(#cloudGrad)"/>
                                <ellipse cx="55" cy="48" rx="14" ry="10" fill="url(#cloudGrad)"/>
                            </svg>
                            <div class="mood-icon-shine"></div>
                        </div>
                        <div class="mood-info">
                            <span class="mood-emoji">⛅</span>
                            <span class="mood-label">多云</span>
                            <span class="mood-emotion">平静</span>
                        </div>
                    </button>

                    <button class="mood-btn" data-mood="overcast" data-label="低落">
                        <div class="mood-icon-wrapper">
                            <svg class="mood-icon" viewBox="0 0 80 80">
                                <defs>
                                    <linearGradient id="overcastGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                        <stop offset="0%" stop-color="#A8B5C4"/>
                                        <stop offset="100%" stop-color="#8A96A5"/>
                                    </linearGradient>
                                </defs>
                                <ellipse cx="28" cy="48" rx="16" ry="10" fill="url(#overcastGrad)"/>
                                <ellipse cx="48" cy="45" rx="18" ry="13" fill="url(#overcastGrad)"/>
                                <ellipse cx="38" cy="42" rx="14" ry="10" fill="url(#overcastGrad)"/>
                                <ellipse cx="54" cy="50" rx="12" ry="8" fill="url(#overcastGrad)"/>
                                <path d="M25 55 L30 52 L38 56 L45 50 L52 54 L55 52" stroke="#8A96A5" stroke-width="2" fill="none" stroke-linecap="round"/>
                            </svg>
                            <div class="mood-icon-shine"></div>
                        </div>
                        <div class="mood-info">
                            <span class="mood-emoji">☁️</span>
                            <span class="mood-label">阴</span>
                            <span class="mood-emotion">低落</span>
                        </div>
                    </button>

                    <button class="mood-btn" data-mood="rainy" data-label="难过">
                        <div class="mood-icon-wrapper">
                            <svg class="mood-icon" viewBox="0 0 80 80">
                                <defs>
                                    <linearGradient id="rainCloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                        <stop offset="0%" stop-color="#7EB8DA"/>
                                        <stop offset="100%" stop-color="#5A9BC7"/>
                                    </linearGradient>
                                </defs>
                                <ellipse cx="30" cy="35" rx="16" ry="10" fill="url(#rainCloudGrad)"/>
                                <ellipse cx="48" cy="32" rx="18" ry="12" fill="url(#rainCloudGrad)"/>
                                <ellipse cx="38" cy="30" rx="14" ry="10" fill="url(#rainCloudGrad)"/>
                                <g stroke="#5A9BC7" stroke-width="2" stroke-linecap="round">
                                    <path d="M22 48 v8"/>
                                    <path d="M30 46 v10"/>
                                    <path d="M38 48 v8"/>
                                    <path d="M46 46 v10"/>
                                    <path d="M54 48 v8"/>
                                </g>
                                <g fill="#7EB8DA">
                                    <circle cx="24" cy="60" r="2"/>
                                    <circle cx="32" cy="62" r="2"/>
                                    <circle cx="40" cy="60" r="2"/>
                                    <circle cx="48" cy="62" r="2"/>
                                    <circle cx="56" cy="60" r="2"/>
                                </g>
                            </svg>
                            <div class="mood-icon-shine"></div>
                        </div>
                        <div class="mood-info">
                            <span class="mood-emoji">🌧️</span>
                            <span class="mood-label">雨</span>
                            <span class="mood-emotion">难过</span>
                        </div>
                    </button>

                    <button class="mood-btn" data-mood="thunder" data-label="焦虑">
                        <div class="mood-icon-wrapper">
                            <svg class="mood-icon" viewBox="0 0 80 80">
                                <defs>
                                    <linearGradient id="thunderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                        <stop offset="0%" stop-color="#4A5568"/>
                                        <stop offset="100%" stop-color="#2D3748"/>
                                    </linearGradient>
                                </defs>
                                <ellipse cx="30" cy="32" rx="16" ry="10" fill="url(#thunderGrad)"/>
                                <ellipse cx="50" cy="28" rx="18" ry="12" fill="url(#thunderGrad)"/>
                                <ellipse cx="40" cy="26" rx="14" ry="10" fill="url(#thunderGrad)"/>
                                <path d="M44 38 L36 52 H46 L38 70" stroke="#FFD93D" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                                <g stroke="#4A5568" stroke-width="2" stroke-linecap="round">
                                    <path d="M24 45 L28 52"/>
                                    <path d="M52 42 L56 50"/>
                                </g>
                            </svg>
                            <div class="mood-icon-shine"></div>
                        </div>
                        <div class="mood-info">
                            <span class="mood-emoji">⛈️</span>
                            <span class="mood-label">雷雨</span>
                            <span class="mood-emotion">焦虑</span>
                        </div>
                    </button>
                </div>
            </section>

            <section id="message-section" class="message-section hidden">
                <div class="message-card">
                    <div class="message-quote">
                        <svg class="quote-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 17h3l2-4V7H5v6h3zm8 0h3l2-4V7h-6v6h3z"/>
                        </svg>
                    </div>
                    <p id="message-text" class="message-text"></p>
                    <div class="message-footer">
                        <span id="message-author" class="message-author"></span>
                    </div>
                </div>
            </section>

            <section id="today-summary" class="today-summary hidden">
                <div class="summary-card">
                    <h3>今日记录</h3>
                    <div class="summary-content">
                        <div class="summary-mood">
                            <span id="summary-emoji" class="summary-emoji"></span>
                            <span id="summary-mood-text" class="summary-mood-text"></span>
                        </div>
                        <div class="summary-time">
                            记录于 <span id="summary-hour"></span>
                        </div>
                    </div>
                    <button id="write-diary-btn" class="diary-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <polyline points="10 9 9 9 8 9"/>
                        </svg>
                        写日记
                    </button>
                </div>
            </section>

            <section id="diary-section" class="diary-section hidden">
                <div class="diary-card">
                    <div class="diary-header">
                        <h3>今日日记</h3>
                        <button class="diary-close" data-close="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"/>
                                <line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                    </div>
                    <div class="diary-date" id="diary-date"></div>
                    <textarea id="diary-input" class="diary-input" placeholder="今天发生了什么？记录一下此刻的心情..."></textarea>
                    <div class="diary-hints">
                        <span class="hint-item">💡 写下今天的小确幸</span>
                        <span class="hint-item">📝 或任何想记录的事</span>
                    </div>
                    <button id="save-diary-btn" class="save-diary-btn">保存日记</button>
                </div>
            </section>

            <section id="diary-view" class="diary-view hidden">
                <div class="diary-view-card">
                    <div class="diary-header">
                        <h3>日记详情</h3>
                        <button class="diary-close" data-close="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"/>
                                <line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                    </div>
                    <div class="diary-view-date" id="view-diary-date"></div>
                    <div class="diary-view-mood" id="view-diary-mood"></div>
                    <div class="diary-view-content" id="view-diary-content"></div>
                    <div class="diary-view-actions">
                        <button id="edit-diary-btn" class="action-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                            </svg>
                            编辑
                        </button>
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                </svg>
                <span>首页</span>
            </button>
            <button class="nav-btn" data-page="calendar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/>
                    <line x1="8" y1="2" x2="8" y2="6"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                <span>日历</span>
            </button>
            <button class="nav-btn" data-page="stats">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="20" x2="18" y2="10"/>
                    <line x1="12" y1="20" x2="12" y2="4"/>
                    <line x1="6" y1="20" x2="6" y2="14"/>
                </svg>
                <span>统计</span>
            </button>
        </nav>

        <section id="calendar-page" class="page hidden">
            <div class="page-header">
                <button class="back-btn" data-page="home">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                </button>
                <h2>心情日历</h2>
            </div>

            <div class="calendar-controls">
                <div class="view-toggle">
                    <button class="view-btn active" data-view="month">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                        月
                    </button>
                    <button class="view-btn" data-view="week">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="6" x2="21" y2="6"/>
                            <line x1="3" y1="12" x2="21" y2="12"/>
                            <line x1="3" y1="18" x2="21" y2="18"/>
                        </svg>
                        周
                    </button>
                </div>
                <button id="go-today" class="today-btn">今天</button>
            </div>

            <div class="calendar-container" id="month-view">
                <div class="calendar-header">
                    <button id="prev-month" class="month-nav">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                    </button>
                    <h3 id="current-month"></h3>
                    <button id="next-month" class="month-nav">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"/>
                        </svg>
                    </button>
                </div>
                <div class="calendar-weekdays">
                    <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                </div>
                <div id="calendar-grid" class="calendar-grid"></div>
                <div class="calendar-legend">
                    <div class="legend-item"><span class="legend-dot sunny"></span>愉悦</div>
                    <div class="legend-item"><span class="legend-dot cloudy"></span>平静</div>
                    <div class="legend-item"><span class="legend-dot overcast"></span>低落</div>
                    <div class="legend-item"><span class="legend-dot rainy"></span>难过</div>
                    <div class="legend-item"><span class="legend-dot thunder"></span>焦虑</div>
                </div>
            </div>

            <div class="week-view hidden" id="week-view">
                <div class="week-header">
                    <button id="prev-week" class="week-nav">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                    </button>
                    <h3 id="current-week-range"></h3>
                    <button id="next-week" class="week-nav">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"/>
                        </svg>
                    </button>
                </div>
                <div id="week-grid" class="week-grid"></div>
            </div>

            <div id="month-insights" class="month-insights hidden">
                <div class="insight-card">
                    <div class="insight-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="16" x2="12" y2="12"/>
                            <line x1="12" y1="8" x2="12.01" y2="8"/>
                        </svg>
                        <h3>本月小结</h3>
                    </div>
                    <div id="insight-content" class="insight-content"></div>
                </div>
            </div>

            <div id="day-detail" class="day-detail hidden">
                <div class="day-detail-card">
                    <button class="detail-close" data-close="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                    <h4 id="detail-date"></h4>
                    <div class="detail-mood-wrapper">
                        <span id="detail-mood" class="detail-mood"></span>
                        <span id="detail-mood-text" class="detail-mood-text"></span>
                    </div>
                    <p id="detail-message" class="detail-message"></p>
                    <div class="detail-actions">
                        <button id="view-diary-from-detail" class="action-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                            </svg>
                            日记
                        </button>
                        <button id="edit-mood-btn" class="action-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                            </svg>
                            修改
                        </button>
                        <button id="delete-mood-btn" class="action-btn delete">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"/>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                            </svg>
                            删除
                        </button>
                    </div>
                </div>
            </div>

            <div id="mood-picker" class="mood-picker hidden">
                <div class="mood-picker-card">
                    <h4>修改心情</h4>
                    <div class="mood-picker-grid">
                        <button class="mood-pick-btn" data-mood="sunny">
                            <span class="pick-emoji">☀️</span>
                            <span class="pick-label">晴</span>
                        </button>
                        <button class="mood-pick-btn" data-mood="cloudy">
                            <span class="pick-emoji">⛅</span>
                            <span class="pick-label">多云</span>
                        </button>
                        <button class="mood-pick-btn" data-mood="overcast">
                            <span class="pick-emoji">☁️</span>
                            <span class="pick-label">阴</span>
                        </button>
                        <button class="mood-pick-btn" data-mood="rainy">
                            <span class="pick-emoji">🌧️</span>
                            <span class="pick-label">雨</span>
                        </button>
                        <button class="mood-pick-btn" data-mood="thunder">
                            <span class="pick-emoji">⛈️</span>
                            <span class="pick-label">雷雨</span>
                        </button>
                    </div>
                    <button class="picker-cancel" data-close="true">取消</button>
                </div>
            </div>
        </section>

        <section id="stats-page" class="page hidden">
            <div class="page-header">
                <button class="back-btn" data-page="home">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                </button>
                <h2>情绪气象站</h2>
            </div>
            <div class="stats-container">
                <div class="stat-card primary">
                    <div class="stat-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </div>
                    <h3>本月记录</h3>
                    <p class="stat-number"><span id="total-days">0</span><small>天</small></p>
                </div>
                <div class="stat-card highlight">
                    <div class="stat-icon sunny-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"/>
                            <line x1="12" y1="1" x2="12" y2="3"/>
                            <line x1="12" y1="21" x2="12" y2="23"/>
                        </svg>
                    </div>
                    <h3>连续晴天</h3>
                    <p class="stat-number"><span id="streak-sunny">0</span><small>天</small></p>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                            <polyline points="17 6 23 6 23 12"/>
                        </svg>
                    </div>
                    <h3>最长连续</h3>
                    <p class="stat-number"><span id="longest-streak">0</span><small>天</small></p>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                        </svg>
                    </div>
                    <h3>心情指数</h3>
                    <p class="stat-number"><span id="mood-index">--</span><small>%</small></p>
                </div>
                <div class="stat-card mood-distribution">
                    <h3>心情分布</h3>
                    <div id="mood-chart" class="mood-chart"></div>
                    <div id="mood-bars" class="mood-bars"></div>
                </div>
                <div class="stat-card weekly-trend">
                    <h3>本周趋势</h3>
                    <div id="weekly-chart" class="weekly-chart"></div>
                </div>
            </div>
            <div id="ai-summary" class="ai-summary hidden">
                <div class="ai-summary-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="16" x2="12" y2="12"/>
                        <line x1="12" y1="8" x2="12.01" y2="8"/>
                    </svg>
                    <h3>本周情绪小结</h3>
                </div>
                <p id="summary-text"></p>
            </div>
        </section>

        <div id="onboarding" class="onboarding hidden">
            <div class="onboarding-overlay"></div>
            <div class="onboarding-card">
                <button class="onboarding-close" data-close="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
                <div class="onboarding-content">
                    <div class="onboarding-step active" data-step="1">
                        <div class="onboarding-icon">🌤️</div>
                        <h2>欢迎来到心情气象站</h2>
                        <p>用天气隐喻情绪，用视觉抚慰心灵</p>
                    </div>
                    <div class="onboarding-step" data-step="2">
                        <div class="onboarding-icon">☀️</div>
                        <h2>记录今日心情</h2>
                        <p>选择符合你心情的天气图标，完成每日记录</p>
                    </div>
                    <div class="onboarding-step" data-step="3">
                        <div class="onboarding-icon">📊</div>
                        <h2>回顾与成长</h2>
                        <p>在日历中回顾历史，在统计中看见变化</p>
                    </div>
                </div>
                <div class="onboarding-footer">
                    <div class="onboarding-dots">
                        <span class="dot active"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>
                    <button id="onboarding-next" class="onboarding-btn">开始</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心情气象站 - 记录你的情绪天气</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="app-container">
        <div id="atmosphere-bg" class="atmosphere-bg"></div>
        <div id="rain-container" class="rain-container"></div>
        <div id="lightning-overlay" class="lightning-overlay"></div>

        <header class="app-header">
            <h1 class="app-title">心情气象站</h1>
            <p class="app-subtitle">记录今天的情绪天气</p>
        </header>

        <main class="main-content">
            <section id="mood-selector" class="mood-selector">
                <div class="mood-icons">
                    <button class="mood-btn" data-mood="sunny" data-label="愉悦">
                        <svg class="mood-icon" viewBox="0 0 64 64">
                            <circle cx="32" cy="32" r="12" fill="none" stroke="currentColor" stroke-width="2"/>
                            <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                <line x1="32" y1="6" x2="32" y2="14"/>
                                <line x1="32" y1="50" x2="32" y2="58"/>
                                <line x1="6" y1="32" x2="14" y2="32"/>
                                <line x1="50" y1="32" x2="58" y2="32"/>
                                <line x1="13.5" y1="13.5" x2="19.2" y2="19.2"/>
                                <line x1="44.8" y1="44.8" x2="50.5" y2="50.5"/>
                                <line x1="13.5" y1="50.5" x2="19.2" y2="44.8"/>
                                <line x1="44.8" y1="19.2" x2="50.5" y2="13.5"/>
                            </g>
                        </svg>
                        <span class="mood-label">晴</span>
                    </button>

                    <button class="mood-btn" data-mood="cloudy" data-label="平静">
                        <svg class="mood-icon" viewBox="0 0 64 64">
                            <path d="M48 28a12 12 0 0 0-12-12 12 12 0 0 0-11.8 10 8 8 0 1 0-15.6 4h38a10 10 0 0 0 1.4-10z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span class="mood-label">多云</span>
                    </button>

                    <button class="mood-btn" data-mood="overcast" data-label="低落">
                        <svg class="mood-icon" viewBox="0 0 64 64">
                            <path d="M46 24a14 14 0 0 0-14-14 14 14 0 0 0-13.7 11.5 10 10 0 1 0-18.6 5h42a12 12 0 0 0 4.3-10z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M20 42h24M22 50h20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <span class="mood-label">阴</span>
                    </button>

                    <button class="mood-btn" data-mood="rainy" data-label="难过">
                        <svg class="mood-icon" viewBox="0 0 64 64">
                            <path d="M44 22a12 12 0 0 0-12-12 12 12 0 0 0-11.8 10 8 8 0 1 0-15.6 4h36a10 10 0 0 0 3.4-8z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M18 40v8M26 38v10M34 40v8M42 38v10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <span class="mood-label">雨</span>
                    </button>

                    <button class="mood-btn" data-mood="thunder" data-label="焦虑">
                        <svg class="mood-icon" viewBox="0 0 64 64">
                            <path d="M40 18a12 12 0 0 0-12-12 12 12 0 0 0-11.8 10 8 8 0 1 0-15.6 4h36a10 10 0 0 0 3.4-8z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M36 32l-8 12h10l-6 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        </svg>
                        <span class="mood-label">雷雨</span>
                    </button>
                </div>
            </section>

            <section id="message-section" class="message-section hidden">
                <div class="message-card">
                    <p id="message-text" class="message-text"></p>
                </div>
            </section>

            <nav class="bottom-nav">
                <button class="nav-btn active" data-page="home">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <span>首页</span>
                </button>
                <button class="nav-btn" data-page="calendar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    <span>日历</span>
                </button>
                <button class="nav-btn" data-page="stats">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="20" x2="18" y2="10"/>
                        <line x1="12" y1="20" x2="12" y2="4"/>
                        <line x1="6" y1="20" x2="6" y2="14"/>
                    </svg>
                    <span>统计</span>
                </button>
            </nav>
        </main>

        <section id="calendar-page" class="page hidden">
            <div class="page-header">
                <button class="back-btn" data-page="home">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                </button>
                <h2>心情日历</h2>
            </div>
            <div class="calendar-container">
                <div class="calendar-header">
                    <button id="prev-month" class="month-nav">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"/>
                        </svg>
                    </button>
                    <h3 id="current-month"></h3>
                    <button id="next-month" class="month-nav">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"/>
                        </svg>
                    </button>
                </div>
                <div class="calendar-weekdays">
                    <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                </div>
                <div id="calendar-grid" class="calendar-grid"></div>
            </div>
            <div id="day-detail" class="day-detail hidden">
                <div class="day-detail-card">
                    <h4 id="detail-date"></h4>
                    <div id="detail-mood" class="detail-mood"></div>
                    <p id="detail-message" class="detail-message"></p>
                </div>
            </div>
        </section>

        <section id="stats-page" class="page hidden">
            <div class="page-header">
                <button class="back-btn" data-page="home">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                </button>
                <h2>情绪气象站</h2>
            </div>
            <div class="stats-container">
                <div class="stat-card">
                    <h3>本月记录</h3>
                    <p class="stat-number" id="total-days">0</p>
                    <p class="stat-label">天</p>
                </div>
                <div class="stat-card">
                    <h3>连续晴天</h3>
                    <p class="stat-number" id="streak-sunny">0</p>
                    <p class="stat-label">天</p>
                </div>
                <div class="stat-card">
                    <h3>最长连续</h3>
                    <p class="stat-number" id="longest-streak">0</p>
                    <p class="stat-label">天</p>
                </div>
                <div class="stat-card mood-distribution">
                    <h3>心情分布</h3>
                    <div id="mood-chart" class="mood-chart"></div>
                </div>
            </div>
            <div id="ai-summary" class="ai-summary hidden">
                <h3>本周情绪小结</h3>
                <p id="summary-text"></p>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>

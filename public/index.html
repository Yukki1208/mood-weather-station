<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>匿名问答</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #f8fafc;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 500px;
      width: 100%;
    }

    .logo {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 1.1rem;
      margin-bottom: 3rem;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .btn {
      padding: 1rem 2rem;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
    }

    .btn-secondary {
      background: #1e293b;
      color: #f8fafc;
      border: 2px solid #334155;
    }

    .btn-secondary:hover {
      background: #334155;
      border-color: #6366f1;
    }

    .features {
      margin-top: 3rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .feature {
      padding: 1rem;
      background: rgba(30, 41, 59, 0.5);
      border-radius: 12px;
      border: 1px solid #334155;
    }

    .feature-icon {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .feature-text {
      font-size: 0.85rem;
      color: #94a3b8;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 2rem;
      }

      .features {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">💬</div>
    <h1>匿名问答</h1>
    <p class="subtitle">面向课堂、讲座、社团活动的即时问答工具</p>

    <div class="buttons">
      <button class="btn btn-primary" onclick="createRoom()">
        <span>🎯</span> 创建房间
      </button>
      <button class="btn btn-secondary" onclick="joinRoom()">
        <span>🚀</span> 加入房间
      </button>
    </div>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">🔒</div>
        <div class="feature-text">完全匿名</div>
      </div>
      <div class="feature">
        <div class="feature-icon">⚡</div>
        <div class="feature-text">实时互动</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📺</div>
        <div class="feature-text">弹幕展示</div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    function createRoom() {
      socket.emit('create-room', (response) => {
        if (response.success) {
          sessionStorage.setItem('roomId', response.roomId);
          sessionStorage.setItem('isHost', 'true');
          window.location.href = `/host.html?room=${response.roomId}`;
        } else {
          alert('创建房间失败');
        }
      });
    }

    function joinRoom() {
      window.location.href = '/participant.html';
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加入房间 - 匿名问答</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #f8fafc;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 500px;
      width: 100%;
    }

    .back-link {
      position: absolute;
      top: 1rem;
      left: 1rem;
      color: #94a3b8;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #f8fafc;
    }

    .logo {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 2rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .input-group {
      margin-bottom: 1.5rem;
    }

    .input-group label {
      display: block;
      text-align: left;
      margin-bottom: 0.5rem;
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .room-input {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }

    .room-input input {
      width: 60px;
      height: 60px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      font-family: monospace;
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 12px;
      color: #f8fafc;
      outline: none;
      transition: all 0.2s;
    }

    .room-input input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .room-input input.filled {
      border-color: #22c55e;
    }

    .btn {
      width: 100%;
      padding: 1rem 2rem;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .error {
      color: #ef4444;
      margin-top: 1rem;
      display: none;
    }

    @media (max-width: 400px) {
      .room-input input {
        width: 50px;
        height: 50px;
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <a href="/" class="back-link">← 返回首页</a>

  <div class="container">
    <div class="logo">🚀</div>
    <h1>加入问答房间</h1>

    <div class="input-group">
      <label>输入6位房间号</label>
      <div class="room-input">
        <input type="text" maxlength="1" id="digit1" inputmode="numeric" pattern="[0-9]" autofocus>
        <input type="text" maxlength="1" id="digit2" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" id="digit3" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" id="digit4" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" id="digit5" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" id="digit6" inputmode="numeric" pattern="[0-9]">
      </div>
    </div>

    <button class="btn btn-primary" id="joinBtn" disabled onclick="joinRoom()">
      加入房间
    </button>

    <p class="error" id="errorMsg"></p>
  </div>

  <script>
    const inputs = [
      document.getElementById('digit1'),
      document.getElementById('digit2'),
      document.getElementById('digit3'),
      document.getElementById('digit4'),
      document.getElementById('digit5'),
      document.getElementById('digit6')
    ];
    const joinBtn = document.getElementById('joinBtn');
    const errorMsg = document.getElementById('errorMsg');

    function setupInputNavigation() {
      inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
          const value = e.target.value.replace(/[^0-9]/g, '');
          e.target.value = value;

          if (value && index < inputs.length - 1) {
            inputs[index + 1].focus();
          }

          updateJoinButton();
        });

        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !e.target.value && index > 0) {
            inputs[index - 1].focus();
          }
        });

        input.addEventListener('paste', (e) => {
          e.preventDefault();
          const pastedData = e.clipboardData.getData('text').replace(/[^0-9]/g, '');

          for (let i = 0; i < Math.min(pastedData.length, inputs.length); i++) {
            inputs[i].value = pastedData[i];
          }

          const lastFilledIndex = Math.min(pastedData.length - 1, inputs.length - 1);
          inputs[lastFilledIndex].focus();
          updateJoinButton();
        });
      });
    }

    function updateJoinButton() {
      const roomCode = inputs.map(i => i.value).join('');
      joinBtn.disabled = roomCode.length !== 6;

      inputs.forEach(i => {
        i.classList.toggle('filled', i.value.length === 1);
      });
    }

    function getRoomCode() {
      return inputs.map(i => i.value).join('');
    }

    function joinRoom() {
      const roomId = getRoomCode();

      if (roomId.length !== 6) {
        showError('请输入完整的6位房间号');
        return;
      }

      sessionStorage.setItem('roomId', roomId);
      sessionStorage.setItem('isHost', 'false');
      window.location.href = `/chat.html?room=${roomId}`;
    }

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.style.display = 'block';
    }

    function handleHashRoute() {
      const hash = window.location.hash;
      if (hash.startsWith('#join/')) {
        const roomId = hash.substring(6);
        if (roomId.length === 6 && /^\d+$/.test(roomId)) {
          for (let i = 0; i < 6; i++) {
            inputs[i].value = roomId[i];
          }
          updateJoinButton();
        }
      }
    }

    setupInputNavigation();
    handleHashRoute();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>匿名发言 - 匿名问答</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      min-height: 100vh;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #334155;
    }

    .room-badge {
      background: #1e293b;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .room-badge .dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .leave-btn {
      background: transparent;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .leave-btn:hover {
      color: #ef4444;
    }

    .message-container {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .message {
      background: #1e293b;
      padding: 1rem;
      border-radius: 16px;
      border-left: 4px solid #6366f1;
      animation: slideInRight 0.3s ease;
      max-width: 85%;
      align-self: flex-end;
    }

    .message.pinned {
      border-left-color: #22c55e;
      background: rgba(34, 197, 94, 0.1);
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .message-time {
      font-size: 0.7rem;
      color: #64748b;
    }

    .pinned-badge {
      font-size: 0.7rem;
      background: #22c55e;
      color: white;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
    }

    .message-content {
      font-size: 1rem;
      line-height: 1.5;
      word-break: break-word;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .input-area {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      padding: 1rem;
      border-top: 1px solid #334155;
    }

    .input-wrapper {
      display: flex;
      gap: 0.75rem;
      max-width: 800px;
      margin: 0 auto;
    }

    .message-input {
      flex: 1;
      padding: 0.875rem 1rem;
      font-size: 1rem;
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 24px;
      color: #f8fafc;
      outline: none;
      transition: all 0.2s;
    }

    .message-input:focus {
      border-color: #6366f1;
    }

    .message-input::placeholder {
      color: #64748b;
    }

    .send-btn {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 1.25rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #64748b;
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
    }

    .toast.error {
      border: 1px solid #ef4444;
    }

    .toast.success {
      border: 1px solid #22c55e;
    }

    @media (max-width: 600px) {
      .message {
        max-width: 95%;
      }

      .input-wrapper {
        padding: 0 0.5rem;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="room-badge">
      <span class="dot"></span>
      <span>房间: <strong id="roomCode">------</strong></span>
    </div>
    <button class="leave-btn" onclick="leaveRoom()">
      ← 退出
    </button>
  </header>

  <div class="message-container" id="messageContainer">
    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">💭</div>
      <p>还没有人发言，说点什么吧...</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <input
        type="text"
        class="message-input"
        id="messageInput"
        placeholder="输入你的问题或想法..."
        maxlength="500"
        autofocus
      >
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        ↑
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let roomId = '';
    let messages = [];

    function getRoomIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('room');
    }

    function init() {
      roomId = getRoomIdFromUrl();
      if (!roomId) {
        alert('无效的房间链接');
        window.location.href = '/participant.html';
        return;
      }

      document.getElementById('roomCode').textContent = roomId;
      document.title = `匿名问答 - 房间${roomId}`;

      socket.emit('join-room', { roomId }, (response) => {
        if (!response.success) {
          showToast(response.error || '加入房间失败', 'error');
          setTimeout(() => {
            window.location.href = '/participant.html';
          }, 2000);
          return;
        }

        messages = response.room.messages || [];
        messages.forEach(msg => addMessageToUI(msg));
        if (messages.length > 0) {
          document.getElementById('emptyState').style.display = 'none';
        }
      });

      socket.on('new-message', (message) => {
        if (!messages.find(m => m.id === message.id)) {
          messages.push(message);
          addMessageToUI(message);
        }
      });

      socket.on('message-pinned', (message) => {
        const idx = messages.findIndex(m => m.id === message.id);
        if (idx !== -1) {
          messages[idx] = message;
          updateMessageInUI(message);
        }
      });

      socket.on('message-deleted', (data) => {
        messages = messages.filter(m => m.id !== data.messageId);
        removeMessageFromUI(data.messageId);
      });

      socket.on('room-closed', () => {
        showToast('房间已关闭，感谢参与！', 'error');
        setTimeout(() => {
          window.location.href = '/';
        }, 2000);
      });

      socket.on('disconnect', () => {
        showToast('连接断开，正在重连...', 'error');
      });

      socket.on('connect', () => {
        showToast('已连接', 'success');
      });

      document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
    }

    function addMessageToUI(message) {
      const container = document.getElementById('messageContainer');
      const emptyState = document.getElementById('emptyState');
      emptyState.style.display = 'none';

      const msgEl = createMessageElement(message);
      container.appendChild(msgEl);
      container.scrollTop = container.scrollHeight;
    }

    function createMessageElement(message) {
      const el = document.createElement('div');
      el.className = 'message' + (message.isPinned ? ' pinned' : '');
      el.id = 'msg-' + message.id;

      const time = new Date(message.timestamp).toLocaleTimeString('zh-CN', {
        hour: '2-digit',
        minute: '2-digit'
      });

      el.innerHTML = `
        <div class="message-header">
          <span class="message-time">${time}</span>
          ${message.isPinned ? '<span class="pinned-badge">置顶</span>' : ''}
        </div>
        <div class="message-content">${escapeHtml(message.content)}</div>
      `;

      return el;
    }

    function updateMessageInUI(message) {
      const existingEl = document.getElementById('msg-' + message.id);
      if (existingEl) {
        const newEl = createMessageElement(message);
        existingEl.replaceWith(newEl);
      }
    }

    function removeMessageFromUI(messageId) {
      const el = document.getElementById('msg-' + messageId);
      if (el) {
        el.remove();
      }

      const container = document.getElementById('messageContainer');
      if (container.children.length === 1) {
        document.getElementById('emptyState').style.display = 'flex';
      }
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const content = input.value.trim();

      if (!content) {
        showToast('请输入内容', 'error');
        return;
      }

      if (!socket.connected) {
        showToast('未连接到服务器', 'error');
        return;
      }

      socket.emit('send-message', { roomId, content }, (response) => {
        if (response.success) {
          input.value = '';
          input.focus();
        } else {
          showToast(response.error || '发送失败', 'error');
        }
      });
    }

    function leaveRoom() {
      if (confirm('确定要退出房间吗？')) {
        socket.disconnect();
        window.location.href = '/participant.html';
      }
    }

    function showToast(message, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type;
      toast.classList.add('show');

      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>问答展示 - 匿名问答</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: #f8fafc;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      z-index: 100;
      border-bottom: 1px solid rgba(51, 65, 85, 0.5);
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .room-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .room-code {
      background: #1e293b;
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      font-family: monospace;
      font-size: 1rem;
      color: #22c55e;
    }

    .close-btn {
      background: transparent;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 1rem;
      padding: 0.5rem;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .close-btn:hover {
      background: #334155;
      color: #f8fafc;
    }

    .stream-container {
      position: relative;
      width: 100%;
      height: 100vh;
      padding-top: 60px;
    }

    .danmaku-lane {
      position: absolute;
      width: 100%;
      height: calc(100% - 60px);
      top: 60px;
      overflow: hidden;
    }

    .danmaku {
      position: absolute;
      white-space: nowrap;
      font-size: 1.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
      border: 2px solid;
      animation: danmaku-fly linear forwards;
      opacity: 0;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    @keyframes danmaku-fly {
      0% {
        transform: translateX(100vw);
        opacity: 0;
      }
      5% {
        opacity: 1;
      }
      95% {
        opacity: 1;
      }
      100% {
        transform: translateX(-100%);
        opacity: 0;
      }
    }

    .card-stream {
      position: absolute;
      top: 70px;
      right: 0;
      width: 380px;
      height: calc(100% - 80px);
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: linear-gradient(to left, rgba(15, 23, 42, 0.95), transparent);
    }

    .card-stream::-webkit-scrollbar {
      width: 0;
    }

    .card {
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 1.25rem;
      border: 2px solid;
      animation: card-slide-in 0.4s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .card.pinned {
      border-color: #22c55e;
      background: rgba(34, 197, 94, 0.15);
    }

    @keyframes card-slide-in {
      from {
        opacity: 0;
        transform: translateX(50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .card-time {
      font-size: 0.75rem;
      color: #64748b;
    }

    .pinned-indicator {
      font-size: 0.7rem;
      background: #22c55e;
      color: white;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .card-content {
      font-size: 1.1rem;
      line-height: 1.6;
      word-break: break-word;
    }

    .empty-state {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #64748b;
    }

    .empty-state-icon {
      font-size: 5rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .empty-state-text {
      font-size: 1.5rem;
    }

    .mode-toggle {
      display: flex;
      gap: 0.5rem;
    }

    .mode-btn {
      padding: 0.4rem 0.8rem;
      font-size: 0.85rem;
      border: 1px solid #334155;
      background: transparent;
      color: #94a3b8;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: #6366f1;
      border-color: #6366f1;
      color: white;
    }

    @media (max-width: 900px) {
      .card-stream {
        width: 300px;
      }

      .danmaku {
        font-size: 1.25rem;
      }
    }

    @media (max-width: 600px) {
      .card-stream {
        width: 100%;
        height: 50%;
        top: auto;
        bottom: 0;
        background: rgba(15, 23, 42, 0.95);
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
      }

      .card {
        min-width: 250px;
        flex-shrink: 0;
      }

      .header {
        padding: 0 1rem;
      }

      .danmaku {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">💬 匿名问答</div>
    <div class="room-info">
      <div class="room-code" id="roomCode">------</div>
      <div class="mode-toggle">
        <button class="mode-btn active" id="cardModeBtn" onclick="switchMode('card')">卡片流</button>
        <button class="mode-btn" id="danmakuModeBtn" onclick="switchMode('danmaku')">弹幕</button>
        <button class="mode-btn" id="bothModeBtn" onclick="switchMode('both')">混合</button>
      </div>
      <button class="close-btn" onclick="window.close()">✕</button>
    </div>
  </header>

  <div class="stream-container">
    <div class="danmaku-lane" id="danmakuLane"></div>
    <div class="card-stream" id="cardStream"></div>
    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">💭</div>
      <div class="empty-state-text">等待提问...</div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let roomId = '';
    let currentMode = 'card';
    const danmakuColors = [
      '#6366f1', '#8b5cf6', '#ec4899', '#f97316',
      '#22c55e', '#06b6d4', '#3b82f6', '#a855f7'
    ];

    const borderColors = [
      '#6366f1', '#8b5cf6', '#ec4899', '#f97316',
      '#22c55e', '#06b6d4', '#3b82f6', '#a855f7',
      '#14b8a6', '#f59e0b', '#ef4444', '#84cc16'
    ];

    function getRoomIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('room');
    }

    function init() {
      roomId = getRoomIdFromUrl();
      if (!roomId) {
        alert('无效的房间链接');
        window.close();
        return;
      }

      document.getElementById('roomCode').textContent = roomId;
      document.title = `问答展示 - 房间${roomId}`;

      socket.emit('join-room', { roomId }, (response) => {
        if (!response.success) {
          alert('加入房间失败');
          window.close();
          return;
        }

        const messages = response.room.messages || [];
        updateCards(messages);
      });

      socket.on('new-message', (message) => {
        addDanmaku(message);
        addCard(message);
        hideEmptyState();
      });

      socket.on('message-pinned', (message) => {
        updateCard(message);
      });

      socket.on('message-deleted', (data) => {
        removeCard(data.messageId);
      });

      socket.on('room-closed', () => {
        alert('房间已关闭');
        window.close();
      });
    }

    function switchMode(mode) {
      currentMode = mode;

      document.getElementById('cardModeBtn').classList.toggle('active', mode === 'card');
      document.getElementById('danmakuModeBtn').classList.toggle('active', mode === 'danmaku');
      document.getElementById('bothModeBtn').classList.toggle('active', mode === 'both');

      const danmakuLane = document.getElementById('danmakuLane');
      const cardStream = document.getElementById('cardStream');

      switch (mode) {
        case 'card':
          danmakuLane.style.display = 'none';
          cardStream.style.display = 'flex';
          break;
        case 'danmaku':
          danmakuLane.style.display = 'block';
          cardStream.style.display = 'none';
          break;
        case 'both':
          danmakuLane.style.display = 'block';
          cardStream.style.display = 'flex';
          break;
      }
    }

    function hideEmptyState() {
      document.getElementById('emptyState').style.display = 'none';
    }

    function showEmptyState() {
      const cardStream = document.getElementById('cardStream');
      if (cardStream.children.length === 0) {
        document.getElementById('emptyState').style.display = 'block';
      }
    }

    function addDanmaku(message) {
      if (currentMode === 'card') return;

      const lane = document.getElementById('danmakuLane');
      const danmaku = document.createElement('div');
      danmaku.className = 'danmaku';

      const colorIndex = Math.abs(hashCode(message.id)) % danmakuColors.length;
      danmaku.style.borderColor = danmakuColors[colorIndex];
      danmaku.style.color = danmakuColors[colorIndex];

      danmaku.textContent = message.content;

      const duration = 8 + Math.random() * 4;
      const topOffset = 10 + Math.random() * 80;
      danmaku.style.top = topOffset + '%';
      danmaku.style.animationDuration = duration + 's';

      lane.appendChild(danmaku);

      setTimeout(() => {
        danmaku.remove();
      }, duration * 1000);
    }

    function addCard(message) {
      if (currentMode === 'danmaku') return;

      const stream = document.getElementById('cardStream');
      const card = document.createElement('div');
      card.className = 'card' + (message.isPinned ? ' pinned' : '');
      card.id = 'card-' + message.id;

      const colorIndex = Math.abs(hashCode(message.id)) % borderColors.length;
      card.style.borderColor = borderColors[colorIndex];

      const time = new Date(message.timestamp).toLocaleTimeString('zh-CN', {
        hour: '2-digit',
        minute: '2-digit'
      });

      card.innerHTML = `
        <div class="card-header">
          <span class="card-time">${time}</span>
          ${message.isPinned ? '<span class="pinned-indicator">📌 置顶</span>' : ''}
        </div>
        <div class="card-content">${escapeHtml(message.content)}</div>
      `;

      stream.insertBefore(card, stream.firstChild);
    }

    function updateCard(message) {
      const existingCard = document.getElementById('card-' + message.id);
      if (existingCard) {
        const newCard = document.createElement('div');
        newCard.className = 'card' + (message.isPinned ? ' pinned' : '');
        newCard.id = 'card-' + message.id;

        const colorIndex = Math.abs(hashCode(message.id)) % borderColors.length;
        newCard.style.borderColor = borderColors[colorIndex];

        const time = new Date(message.timestamp).toLocaleTimeString('zh-CN', {
          hour: '2-digit',
          minute: '2-digit'
        });

        newCard.innerHTML = `
          <div class="card-header">
            <span class="card-time">${time}</span>
            ${message.isPinned ? '<span class="pinned-indicator">📌 置顶</span>' : ''}
          </div>
          <div class="card-content">${escapeHtml(message.content)}</div>
        `;

        existingCard.replaceWith(newCard);
      }
    }

    function removeCard(messageId) {
      const card = document.getElementById('card-' + messageId);
      if (card) {
        card.remove();
      }

      const stream = document.getElementById('cardStream');
      if (stream.children.length === 0) {
        showEmptyState();
      }
    }

    function updateCards(messages) {
      const stream = document.getElementById('cardStream');
      stream.innerHTML = '';

      if (messages.length === 0) {
        showEmptyState();
        return;
      }

      hideEmptyState();

      const pinned = messages.filter(m => m.isPinned);
      const normal = messages.filter(m => !m.isPinned);

      [...pinned, ...normal].forEach(msg => {
        const card = document.createElement('div');
        card.className = 'card' + (msg.isPinned ? ' pinned' : '');
        card.id = 'card-' + msg.id;

        const colorIndex = Math.abs(hashCode(msg.id)) % borderColors.length;
        card.style.borderColor = borderColors[colorIndex];

        const time = new Date(msg.timestamp).toLocaleTimeString('zh-CN', {
          hour: '2-digit',
          minute: '2-digit'
        });

        card.innerHTML = `
          <div class="card-header">
            <span class="card-time">${time}</span>
            ${msg.isPinned ? '<span class="pinned-indicator">📌 置顶</span>' : ''}
          </div>
          <div class="card-content">${escapeHtml(msg.content)}</div>
        `;

        stream.appendChild(card);
      });
    }

    function hashCode(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return hash;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    switchMode('card');
    init();
  </script>
</body>
</html>
